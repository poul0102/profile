<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SANGTAEK.DEV - 메인</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 800: '#1e293b', 900: '#0f172a' },
            moss: { 300: '#a3b18a', 400: '#8b9a74', 500: '#607246', 600: '#4a5935' }
          }
        }
      }
    }
  </script>

  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

    body {
      font-family: 'Pretendard', sans-serif;
    }
  </style>
</head>

<body class="bg-[#0f172a] text-[#f8fafc]">

  <nav class="sticky top-0 z-[1000] bg-[#0f172a]/95 border-b border-white/10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

      <a href="index.html" class="text-xl font-bold tracking-widest text-white">SANGTAEK.DEV</a>

      <button id="hamburger" class="md:hidden flex flex-col gap-1.5 p-1 focus:outline-none">
        <span class="w-6 h-0.5 bg-white rounded-full"></span>
        <span class="w-6 h-0.5 bg-white rounded-full"></span>
        <span class="w-6 h-0.5 bg-white rounded-full"></span>
      </button>

      <ul id="nav-menu"
        class="hidden md:flex gap-10 absolute md:relative top-[60px] md:top-0 left-0 w-full md:w-auto bg-[#0f172a]/98 md:bg-transparent flex-col md:flex-row items-center py-8 md:py-0 border-b md:border-0 border-white/10 transition-all duration-300">
        <li><a href="index.html"
            class="text-sm font-medium text-white border-b-2 border-moss-500 transition-all">MAIN</a>
        </li>
        <li><a href="storyGrowth.html"
            class="text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent hover:border-moss-500 transition-all">ABOUT ME</a></li>
        <li><a href="strengths.html"
            class="text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent hover:border-moss-500 transition-all">CORE
            STRENGTHS</a></li>
        <li><a href="tasteHumanity.html"
            class="text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent hover:border-moss-500 transition-all">TASTE
            & HUMANITY</a></li>
      </ul>
    </div>
  </nav>

  <section id="hero" class="relative min-h-[90vh] flex items-center justify-center px-6 py-20 overflow-hidden">
    <canvas id="connectionsCanvas" class="absolute inset-0 z-0 w-full h-full opacity-60"></canvas>

    <div class="relative z-10 max-w-4xl mx-auto text-center pointer-events-none select-none">
      <span
        class="inline-block px-4 py-1.5 mb-6 bg-moss-600/30 border border-moss-400/30 rounded-full text-moss-300 text-xs md:text-sm font-medium tracking-widest uppercase">
        Backend Engineer & Explorer
      </span>
      <h1 class="text-3xl md:text-5xl lg:text-5xl font-light leading-tight md:leading-snug text-white mb-8">
        선과 선을 <span class="text-moss-300 font-normal">연결</span>하듯, 프론트와 AI를 품는
        <br />
        백엔드 개발자 <span class="font-normal border-b border-moss-400/60 pb-1 text-moss-300">강상택</span>입니다.
      </h1>
      <p class="max-w-2xl mx-auto text-sm md:text-base text-navy-200 leading-relaxed font-light mb-12">
        서버의 깊은 로직을 든든하게 다지는 것뿐 아니라, 화면 너머의 사용자 경험(Frontend)과 기술의 최전선(AI)을 유기적으로 잇고 싶습니다.
      </p>
    </div>
  </section>

  <script>
    // 네비게이션 동작
    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("nav-menu");
    hamburger.addEventListener("click", () => {
      navMenu.classList.toggle("hidden");
      navMenu.classList.toggle("flex");
    });

    // 히어로 캔버스 효과
    const canvas = document.getElementById('connectionsCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];
    const mouse = { x: null, y: null };

    function initCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = document.getElementById('hero').offsetHeight;
      particles = [];
      const particleCount = Math.floor((width * height) / 15000);
      for (let i = 0; i < particleCount; i++) {
        particles.push({ x: Math.random() * width, y: Math.random() * height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, radius: Math.random() * 1.5 + 0.5 });
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      particles.forEach((p, index) => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > width) p.vx *= -1;
        if (p.y < 0 || p.y > height) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(96, 114, 70, 0.4)';
        ctx.fill();
        for (let j = index + 1; j < particles.length; j++) {
          const p2 = particles[j], dx = p.x - p2.x, dy = p.y - p2.y, dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(96, 114, 70, ${0.2 - dist / 500})`;
            ctx.stroke();
          }
        }
      });
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', initCanvas);
    initCanvas();
    animate();
  </script>
</body>

</html>
