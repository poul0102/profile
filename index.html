<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SANGTAEK.DEV - 메인</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 200: '#b1c5d4', 800: '#1e293b', 900: '#0f172a' },
            moss: { 300: '#a3b18a', 400: '#8b9a74', 500: '#607246', 600: '#4a5935' }
          }
        }
      }
    }
  </script>

  <style>
    /* =========================================
       요청하신 네비게이션 바 CSS (수정 없이 원본 그대로 삽입) 
       ========================================= */
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

    :root {
      --deep-navy: #0f172a;
      /* 메인 배경색 */
      --moss-green: #607246;
      /* 포인트 색상 */
      --text-white: #f8fafc;
      /* 글자색 */
    }

    body {
      margin: 0;
      font-family: 'Pretendard', sans-serif;
      background-color: var(--deep-navy);
      color: var(--text-white);
    }

    /* 네비게이션 바 전체 컨테이너 */
    .navbar {
      background-color: rgba(15, 23, 42, 0.95);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 2rem;
    }

    /* 로고 디자인 */
    .nav-logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-white);
      text-decoration: none;
      letter-spacing: 1px;
    }

    /* 메뉴 리스트 (데스크탑) */
    .nav-menu {
      display: flex;
      gap: 2.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-link {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s ease;
      padding-bottom: 4px;
    }

    /* 마우스 오버 및 현재 페이지(active) 강조 */
    .nav-link:hover,
    .nav-link.active {
      color: var(--text-white);
      border-bottom: 2px solid var(--moss-green);
    }

    /* 햄버거 메뉴 버튼 (모바일용, 기본은 숨김) */
    .hamburger {
      display: none;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
    }

    .hamburger .bar {
      width: 25px;
      height: 3px;
      background-color: var(--text-white);
      border-radius: 3px;
      transition: all 0.3s ease-in-out;
    }

    /* 모바일 반응형 (768px 이하) */
    @media (max-width: 768px) {
      .hamburger {
        display: flex;
      }

      .nav-menu {
        position: absolute;
        top: 60px;
        left: -100%;
        flex-direction: column;
        background-color: rgba(15, 23, 42, 0.98);
        width: 100%;
        text-align: center;
        transition: 0.3s ease-in-out;
        padding: 2rem 0;
        gap: 1.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* active 클래스가 붙으면 메뉴가 화면에 슬라이드 인 */
      .nav-menu.active {
        left: 0;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">SANGTAEK.DEV</a>

      <div class="hamburger" id="hamburger">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>

      <ul class="nav-menu" id="nav-menu">
        <li class="nav-item">
          <a href="index.html" class="nav-link">MAIN</a>
        </li>
        <li class="nav-item">
          <a href="storyGrowth.html" class="nav-link">STORY & GROWTH</a>
        </li>
        <li class="nav-item">
          <a href="strengths.html" class="nav-link">CORE STRENGTHS</a>
        </li>
        <li class="nav-item">
          <a href="tasteHumanity.html" class="nav-link">TASTE & HUMANITY</a>
        </li>
      </ul>
    </div>
  </nav>

  <section id="hero" class="relative min-h-[90vh] flex items-center justify-center px-6 py-20 overflow-hidden">
    <canvas id="connectionsCanvas" class="absolute inset-0 z-0 w-full h-full opacity-60"></canvas>

    <div class="relative z-10 max-w-4xl mx-auto text-center pointer-events-none select-none">
      <span
        class="inline-block px-4 py-1.5 mb-6 bg-moss-600/30 border border-moss-400/30 rounded-full text-moss-300 text-xs md:text-sm font-medium tracking-widest uppercase">
        Backend Engineer & Explorer
      </span>
      <h1 class="text-3xl md:text-5xl lg:text-5xl font-light leading-tight md:leading-snug text-white mb-8">
        선과 선을 <span class="text-moss-300 font-normal">연결</span>하듯,
        프론트와 AI를 품는
        <br />
        백엔드 개발자 <span class="font-normal border-b border-moss-400/60 pb-1 text-moss-300">강상택</span>입니다.
      </h1>
      <p class="max-w-2xl mx-auto text-sm md:text-base text-navy-200 leading-relaxed font-light mb-12">
        서버의 깊은 로직을 든든하게 다지는 것뿐 아니라, 화면 너머의 사용자 경험(Frontend)과 기술의 최전선(AI)을 유기적으로 잇고 싶습니다.
        치열한 부트캠프를 지나 이제는 동료들과 함께 지치지 않고 달릴 러닝메이트를 찾고 있습니다.
      </p>
    </div>
  </section>

  <script>
    // 1. 네비게이션 바 동작 스크립트 (원본 유지)
    document.addEventListener("DOMContentLoaded", () => {
      const hamburger = document.getElementById("hamburger");
      const navMenu = document.getElementById("nav-menu");

      hamburger.addEventListener("click", () => {
        navMenu.classList.toggle("active");
      });

      document.querySelectorAll(".nav-link").forEach(link =>
        link.addEventListener("click", () => {
          navMenu.classList.remove("active");
        })
      );
    });

    // 2. 히어로 섹션 배경 선 연결(Node Connection) 캔버스 효과
    const canvas = document.getElementById('connectionsCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    const mouse = { x: null, y: null };

    function initCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = document.getElementById('hero').offsetHeight;
      particles = [];
      const particleCount = Math.floor((width * height) / 15000);

      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          radius: Math.random() * 1.5 + 0.5
        });
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);

      particles.forEach((p, index) => {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > width) p.vx *= -1;
        if (p.y < 0 || p.y > height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(96, 114, 70, 0.4)'; // moss green 색상
        ctx.fill();

        for (let j = index + 1; j < particles.length; j++) {
          const p2 = particles[j];
          const dx = p.x - p2.x;
          const dy = p.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(96, 114, 70, ${0.2 - dist / 500})`;
            ctx.stroke();
          }
        }

        // 마우스 상호작용
        if (mouse.x != null) {
          const dx = p.x - mouse.x;
          const dy = p.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 150) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = `rgba(163, 177, 138, ${0.4 - dist / 375})`;
            ctx.stroke();
          }
        }
      });
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', initCanvas);
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
    });
    canvas.addEventListener('mouseleave', () => {
      mouse.x = null;
      mouse.y = null;
    });

    initCanvas();
    animate();
  </script>
</body>

</html>
